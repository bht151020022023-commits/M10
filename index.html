<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz AMO Pro</title>

<style>
:root{
    --bg:#eef2f5;
    --card:#ffffff;
    --text:#000;
}
body{
    font-family:-apple-system;
    background:var(--bg);
    margin:0;
    font-size:20px;
    color:var(--text);
}
.box{padding:15px;}
.card{
    background:var(--card);
    padding:25px;
    border-radius:18px;
}
input{
    width:48%;
    padding:20px;
    margin:10px 1%;
    border-radius:16px;
    border:none;
    font-size:22px;
    text-align:center;
}
label{
    font-size:18px;
    display:block;
    margin-top:8px;
}
#question{
    font-size:22px;
    font-weight:bold;
    margin-bottom:18px;
}
.answer-btn{
    width:100%;
    padding:18px;
    margin:10px 0;
    border-radius:14px;
    border:none;
    background:#424242;
    text-align:left;
    font-size:18px;
    color:white;
}
.selected{background:#1565c0;}
.correct{background:#2e7d32;}
.wrong{background:#c62828;}
#explanation{
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    background:#e3f2fd;
    display:none;
}
.btn{
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:14px;
}
.confirm{background:#4CAF50;color:white;}
.next{background:#2196F3;color:white;display:none;}
.retry{background:#ff9800;color:white;}
#score{margin-top:10px;font-weight:bold;}

.list-item{
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    color:white;
}
.correct-answer{
    background:#4CAF50;
    padding:6px;
    border-radius:8px;
    margin-top:5px;
}

#homeBtn{
    position:fixed;
    top:20px;
    right:20px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 14px;
    z-index:9999;
}
</style>
</head>

<body>

<script src="questions.js"></script>

<div class="box">
<div class="card">

<div id="totalQ"></div>

<div id="startArea">
<input type="number" id="startQ" placeholder="Từ câu">
<input type="number" id="endQ" placeholder="Đến câu">

<div id="rangeCount"></div>

<div style="margin-top:15px;">
<label><input type="radio" name="mode" value="random" checked> 🔀 Đảo câu & đáp án</label>
<label><input type="radio" name="mode" value="normal"> 📌 Giữ nguyên thứ tự</label>
</div>

<button class="btn confirm" id="startBtn" onclick="startQuiz()" disabled>Bắt đầu</button>
<button class="btn next" onclick="showList()" style="display:block;">📋 Danh sách câu</button>

<div id="listArea"></div>
</div>

<div id="quizArea" style="display:none;">
<button id="homeBtn" onclick="goHome()">🏠</button>

<div id="question"></div>
<div id="answers"></div>
<div id="explanation"></div>

<button class="btn confirm" id="confirmBtn" onclick="confirmAnswer()">Xác nhận</button>
<button class="btn next" id="nextBtn" onclick="nextQuestion()">Câu tiếp</button>
<button class="btn retry" id="retryBtn" onclick="retryWrong()" style="display:none;">Làm lại câu sai</button>

<div id="score"></div>
</div>

</div>
</div>

<script>
let questions=[], wrongQuestions=[];
let current=0, score=0, selected=null, answered=false;
let currentOptions=[];

function startQuiz(){
    let start=parseInt(startQ.value)||1;
    let end=parseInt(endQ.value)||allQuestions.length;
    let mode=document.querySelector('input[name="mode"]:checked').value;

    let filtered=allQuestions.filter(q=>q.id>=start && q.id<=end);

    if(mode==="random"){
        filtered.sort(()=>Math.random()-0.5);
    }

    questions=filtered;

    current=0; score=0; wrongQuestions=[];

    startArea.style.display="none";
    quizArea.style.display="block";

    loadQuestion();
}

function loadQuestion(){
    selected=null; answered=false;

    confirmBtn.style.display="block";
    nextBtn.style.display="none";
    explanation.style.display="none";

    let q=questions[current];
    question.innerText=`Câu ${current+1}/${questions.length} (ID ${q.id}): ${q.question}`;

    answers.innerHTML="";

    currentOptions=q.options.map(opt=>{
        return {text:opt.substring(opt.indexOf(".")+1).trim()};
    });

    let mode=document.querySelector('input[name="mode"]:checked').value;

    if(mode==="random"){
        currentOptions.sort(()=>Math.random()-0.5);
    }

    let letters=["A","B","C"];

    currentOptions.forEach((opt,i)=>{
        let btn=document.createElement("button");
        btn.className="answer-btn";
        btn.innerHTML=`<b>${letters[i]}.</b> ${opt.text}`;

        btn.onclick=()=>{
            if(answered) return;
            selected=opt;
            document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
            btn.classList.add("selected");
        };

        answers.appendChild(btn);
    });
}

function confirmAnswer(){
    if(!selected||answered) return;
    answered=true;

    let q=questions[current];
    let correctText=q.options.find(o=>o.startsWith(q.answer+"."));
    correctText=correctText.substring(correctText.indexOf(".")+1).trim();

    let isCorrect=selected.text===correctText;

    document.querySelectorAll(".answer-btn").forEach((b,i)=>{
        let opt=currentOptions[i];
        if(opt.text===correctText) b.classList.add("correct");
        if(opt.text===selected.text && !isCorrect) b.classList.add("wrong");
    });

    if(isCorrect) score++;
    else wrongQuestions.push(q);

    explanation.innerText=q.explanation || ("Đáp án đúng: "+q.answer);
    explanation.style.display="block";

    score.innerText=`Điểm: ${score}/${questions.length}`;

    confirmBtn.style.display="none";
    nextBtn.style.display="block";

    if(current===questions.length-1 && wrongQuestions.length>0){
        retryBtn.style.display="block";
    }
}

function nextQuestion(){
    current++;
    if(current>=questions.length) return;
    loadQuestion();
}

function retryWrong(){
    questions=[...wrongQuestions];
    wrongQuestions=[];
    current=0; score=0;

    retryBtn.style.display="none";
    loadQuestion();
}

function goHome(){
    if(confirm("Bạn có chắc muốn quay về trang chủ không?")){
        quizArea.style.display="none";
        startArea.style.display="block";
    }
}

function updateRange(){
    let s=parseInt(startQ.value);
    let e=parseInt(endQ.value);

    if(!s||!e){
        startBtn.disabled=true;
        return;
    }

    let count=allQuestions.filter(q=>q.id>=s && q.id<=e).length;
    startBtn.disabled = count===0;
}

startQ.oninput=endQ.oninput=updateRange;

function showList(){
    listArea.innerHTML="";

    allQuestions.forEach(q=>{
        let div=document.createElement("div");
        div.className="list-item";

        div.innerHTML=`
        <b>Câu ${q.id}:</b> ${q.question}
        ${q.options.map(opt=>{
            let isCorrect=opt.startsWith(q.answer+".");
            return `<div class="${isCorrect?'correct-answer':''}">${opt}</div>`;
        }).join("")}
        `;

        listArea.appendChild(div);
    });
}

window.onload=()=>{
    totalQ.innerText="Tổng số câu: "+allQuestions.length;
}
</script>

</body>
</html>
